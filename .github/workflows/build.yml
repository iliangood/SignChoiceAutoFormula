name: Build Zig (master)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl      
          - x86_64-windows-gnu    
          - aarch64-linux-musl
          - x86_64-linux-gnu     
          - x86_64-macos

    runs-on: ubuntu-latest      

    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig master
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myprogram-${{ matrix.target }}
          path: zig-out/bin/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # только при git tag v1.2.3 ...
    runs-on: ubuntu-latest
    permissions:
      contents: write   # нужно, чтобы создавать релиз

    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: myprogram-*          # или как ты назвал артефакты
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true     # автоматически берёт changelog из PR/коммитов
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
