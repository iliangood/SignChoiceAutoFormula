name: Build Zig Project
on: [push, pull_request]

jobs:
  build:
    strategy:
      # Матрица позволяет запускать сборку сразу на нескольких ОС
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Установка Zig (master)
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          zig-version: master

      # Сборка под текущую ОС (нативной сборкой)
      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      # Пример кросс-компиляции (только на Linux для экономии времени)
      # Zig позволяет из Linux собрать .exe для Windows без лишних мучений
      - if: matrix.os == 'ubuntu-latest'
        name: Cross-build for Windows from Linux
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseSafe
        
